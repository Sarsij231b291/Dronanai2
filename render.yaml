# Render Blueprint — Drona AI Backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: drona-ai-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: drona-ai-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false   # You'll set this manually in the dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: BREVO_SMTP_USER
        sync: false
      - key: BREVO_SMTP_PASSWORD
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false

databases:
  - name: drona-ai-db
    plan: free
    region: oregon
    databaseName: drona_ai
